<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuvak Calculator</title>
    <script src="scripts/main.js"></script>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <div class="classicDiv">
    <div class="input"><p id="input"></p></div><br>
        <div class="Buttons">
        <button value="1" onclick="get_num(this.value)">1</button>
        <button value="2" onclick="get_num(this.value)">2</button>
        <button value="3" onclick="get_num(this.value)">3</button>
        <button value="/" onclick="get_num(this.value)">/</button> <br>
        <button value="4" onclick="get_num(this.value)">4</button>
        <button value="5" onclick="get_num(this.value)">5</button>
        <button value="6" onclick="get_num(this.value)">6</button>
        <button value="*" onclick="get_num(this.value)">*</button> <br>
        <button value="7" onclick="get_num(this.value)">7</button>
        <button value="8" onclick="get_num(this.value)">8</button>
        <button value="9" onclick="get_num(this.value)">9</button>
        <button value="-" onclick="get_num(this.value)">-</button> <br>
        <button value="0" onclick="get_num(this.value)">0</button>
        <button value="00" onclick="get_num(this.value)">00</button>
        <button value="." onclick="get_num(this.value)">.</button>
        <button value="=" onclick="result()">=</button>
        </div>
    </div>
</body>
</html>
